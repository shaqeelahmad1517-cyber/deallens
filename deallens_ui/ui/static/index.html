<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DealLens</title>
<style>
  :root{--accent:#1F4E79;--accent2:#2E75B6;--light:#D6E4F0;--grey:#F4F6F9;--line:#e3e7ee;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1a2230;background:#eef1f6;}
  header{background:var(--accent);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;}
  header .brand{font-weight:700;letter-spacing:.5px;font-size:18px;}
  header .tag{opacity:.8;font-size:13px;}
  .layout{display:flex;min-height:calc(100vh - 52px);}
  .sidebar{width:320px;background:#fff;border-right:1px solid var(--line);padding:16px;overflow:y;}
  .main{flex:1;padding:24px 30px;max-width:900px;}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:9px 14px;background:var(--accent);color:#fff;font-weight:600;}
  button.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent);}
  button.sm{padding:6px 10px;font-size:13px;}
  button:disabled{opacity:.5;cursor:default;}
  .deal-card{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:.12s;}
  .deal-card:hover{border-color:var(--accent2);}
  .deal-card.active{border-color:var(--accent);background:var(--grey);}
  .deal-card .t{font-weight:600;}
  .deal-card .m{font-size:12px;color:#667;margin-top:3px;display:flex;justify-content:space-between;}
  .stage{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:var(--light);color:var(--accent);padding:2px 7px;border-radius:5px;}
  h2{color:var(--accent);margin:0 0 4px;}
  h3{color:var(--accent2);margin:22px 0 8px;font-size:15px;}
  .muted{color:#778;font-size:13px;}
  label{display:block;font-size:12px;color:#556;margin:10px 0 3px;font-weight:600;}
  input,select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font:inherit;background:#fff;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 14px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:12px;padding:20px 24px;margin:14px 0;}
  .hero .lbl{text-transform:uppercase;letter-spacing:1px;font-size:11px;opacity:.85;}
  .hero .rng{font-size:30px;font-weight:700;margin-top:5px;}
  .hero .mid{font-size:13px;opacity:.9;}
  table{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  th{background:var(--accent);color:#fff;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
  .flag{padding:7px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .badge{color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;margin-right:8px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .hidden{display:none;}
  .toast{position:fixed;bottom:18px;right:18px;background:#222;color:#fff;padding:11px 16px;border-radius:8px;font-size:14px;opacity:0;transition:.2s;}
  .toast.show{opacity:1;}
</style></head>
<body>
<header>
  <span class="brand">DealLens</span>
  <span class="tag">Due Diligence &amp; Valuation</span>
  <span style="flex:1"></span>
  <span id="whoami" class="tag" style="margin-right:10px"></span>
  <button class="sm ghost" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.4)" onclick="showQuickScreen()">⚡ Quick screen</button>
  <button class="sm ghost" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.4);margin-left:8px" onclick="showBank()">🏦 Bank</button>
  <button class="sm ghost" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.4);margin-left:8px" onclick="showConglomerate()">🏢 Conglomerate</button>
  <button id="logoutBtn" class="sm ghost hidden" style="background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.4);margin-left:8px" onclick="logout()">Log out</button>
</header>

<!-- Login gate -->
<div id="authGate" class="hidden" style="max-width:380px;margin:60px auto;">
  <div class="card">
    <h2 id="authTitle">Log in to DealLens</h2>
    <div class="muted" id="authSub">Sign in to your deals.</div>
    <div id="nameField" class="hidden"><label>Name</label><input id="au_name"></div>
    <label>Email</label><input id="au_email" type="email">
    <label>Password</label><input id="au_pass" type="password">
    <div id="authErr" style="color:#C0392B;font-size:13px;margin-top:8px;"></div>
    <div class="row" style="margin-top:16px;">
      <button id="authBtn" onclick="doAuth()">Log in</button>
      <button class="ghost" onclick="toggleAuthMode()"><span id="authToggle">Create an account</span></button>
    </div>
  </div>
</div>

<div id="app" class="layout hidden">
  <div class="sidebar">
    <div class="row" style="justify-content:space-between;margin-bottom:12px;">
      <strong>Deals</strong>
      <button class="sm" onclick="showCreate()">+ New deal</button>
    </div>
    <div id="dealList"></div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let META = {sectors:[],business_types:[],metrics:[],stages:[]};
let CURRENT = null;

const money = n => (n==null?'—':'$'+Math.round(n).toLocaleString());
const xx = n => (n==null?'—':Number(n).toFixed(2)+'×');

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

async function api(method, path, body){
  const r = await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  const ct = r.headers.get('Content-Type')||'';
  if(ct.includes('application/json')) return r.json();
  return r.text();
}

async function loadMeta(){ META = await api('GET','/api/meta'); }

async function loadDeals(){
  const env = await api('GET','/api/deals');
  const list = $('dealList'); list.innerHTML='';
  const deals = (env.result&&env.result.deals)||[];
  if(!deals.length){ list.innerHTML='<div class="muted">No deals yet. Create one to start.</div>'; }
  deals.forEach(d=>{
    const rng = d.recommended_range ? money(d.recommended_range.low)+'–'+money(d.recommended_range.high) : 'not evaluated';
    const el = document.createElement('div');
    el.className='deal-card'+(CURRENT===d.id?' active':'');
    el.onclick=()=>openDeal(d.id);
    el.innerHTML=`<div class="t">${d.target_name||'(untitled)'}</div>
      <div class="m"><span class="stage">${d.stage}</span><span>${rng}</span></div>`;
    list.appendChild(el);
  });
}

function field(label,id,value='',type='text'){
  return `<div><label>${label}</label><input id="${id}" type="${type}" value="${value}"></div>`;
}
function selectField(label,id,opts,val){
  return `<div><label>${label}</label><select id="${id}">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

// ---- Bank valuation ----
function showBank(){
  CURRENT=null; loadDeals();
  $('main').innerHTML = `
  <h2>🏦 Bank / financial institution</h2>
  <div class="muted">Banks are valued on <strong>book value (P/B)</strong> and <strong>earnings (P/E)</strong> — not EBITDA, because interest is a bank's revenue, not a cost.</div>
  <div class="card" style="margin-top:14px;">
    <div class="grid">
      ${field('Institution name','b_name')}
      ${selectField('Institution type','b_type',META.bank_types||['universal_bank'],'universal_bank')}
      ${field('Net income','b_ni','','number')}
      ${field('Book value (equity)','b_book','','number')}
      ${field('Total assets (if no book value)','b_assets','','number')}
      ${field('Total liabilities (if no book value)','b_liab','','number')}
    </div>
    <div class="row" style="margin-top:16px;">
      <button onclick="runBank()">Value it</button>
      <button class="ghost" onclick="$('main').innerHTML='';loadDeals();">Close</button>
    </div>
    <div id="b_result"></div>
  </div>`;
}
async function runBank(){
  const p={bank_type:$('b_type').value};
  const ni=num('b_ni'); if(ni!==undefined)p.net_income=ni;
  const bk=num('b_book'); if(bk!==undefined)p.book_value=bk;
  const ta=num('b_assets'); if(ta!==undefined)p.total_assets=ta;
  const tl=num('b_liab'); if(tl!==undefined)p.total_liabilities=tl;
  const env=await api('POST','/api/banking',p);
  const box=$('b_result');
  if(!env.ok){box.innerHTML=`<div class="muted" style="color:#C0392B;margin-top:12px;">${env.error.message}</div>`;return;}
  const r=env.result, rr=r.recommended_range;
  if(!rr){box.innerHTML=`<div class="muted" style="margin-top:12px;">Not enough inputs — provide net income and/or book value.</div>`;return;}
  let rows='';
  for(const [k,a] of Object.entries(r.approaches||{})){
    rows+=`<tr><td>${k.replace(/_/g,' ')} (×${a.multiple[0]}–${a.multiple[1]})</td><td class="num">${money(a.low)} – ${money(a.high)}</td></tr>`;
  }
  window._lastBank=r;
  box.innerHTML=`<div class="hero" style="margin-top:16px;">
      <div class="lbl">Indicative value — ${(($('b_name').value)||'this institution')} (${r.bank_type.replace(/_/g,' ')})</div>
      <div class="rng">${money(rr.low)} – ${money(rr.high)}</div>
      <div class="mid">Midpoint ${money(rr.mid)}${r.roe!=null?' · ROE '+(r.roe*100).toFixed(1)+'%':''}</div></div>
    <table><thead><tr><th>Method</th><th style="text-align:right">Value</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="muted" style="margin-top:8px;">${r.method}</div>
    <div class="row" style="margin-top:10px;"><button class="sm ghost" onclick="explainResult('bank',window._lastBank,'b_explain')">📖 Explain in plain English</button></div>
    <div id="b_explain"></div>`;
}

// ---- Conglomerate (sum-of-the-parts) ----
let SEGMENTS=[];
let CONG_MODE='multiple';
function _newSeg(){return {name:'',sector:'saas',metric:'ebitda',tier:'public',earnings:'',
  net_income:'',depreciation:'',interest:'',taxes:'',total_assets:'',total_liabilities:''};}
function showConglomerate(){
  CURRENT=null; loadDeals(); CONG_MODE='multiple'; SEGMENTS=[_newSeg()];
  renderConglomerate();
}
function setCongMode(m){ _readSegs(); CONG_MODE=m; renderConglomerate(); }
function renderConglomerate(){
  const deep = CONG_MODE==='deep';
  const segHtml=SEGMENTS.map((s,i)=>{
    const comps=`${field('Segment name','cs_name_'+i,s.name)}
      ${selectField('Sector','cs_sector_'+i,META.sectors||['general'],s.sector)}
      ${selectField('Metric','cs_metric_'+i,META.metrics||['ebitda'],s.metric)}
      ${selectField('Tier','cs_tier_'+i,['smb','public'],s.tier)}`;
    const inner = deep
      ? `<div class="grid3">${comps}
          ${field('Net income','cs_ni_'+i,s.net_income,'number')}
          ${field('Depreciation & amort.','cs_dep_'+i,s.depreciation,'number')}
          ${field('Interest','cs_int_'+i,s.interest,'number')}
          ${field('Taxes','cs_tax_'+i,s.taxes,'number')}
          ${field('Total assets','cs_ta_'+i,s.total_assets,'number')}
          ${field('Total liabilities','cs_tl_'+i,s.total_liabilities,'number')}</div>`
      : `<div class="grid3">${comps}
          ${field('Earnings (of that metric)','cs_earn_'+i,s.earnings,'number')}</div>`;
    return `<div class="card" style="padding:12px;margin-bottom:8px;background:#fafbfd;">${inner}
      <div class="row" style="margin-top:6px;"><button class="sm ghost" onclick="removeSeg(${i})" ${SEGMENTS.length<=1?'disabled':''}>Remove segment</button></div></div>`;
  }).join('');
  $('main').innerHTML = `
  <h2>🏢 Conglomerate — sum of the parts</h2>
  <div class="muted">Value each business segment on its own basis, then combine. (How you'd value an Amazon-type company: cloud + retail + ads priced differently.)</div>
  <div class="row" style="margin-top:10px;gap:6px;">
    <span class="muted">Depth:</span>
    <button class="sm ${deep?'ghost':''}" onclick="setCongMode('multiple')">Quick (single multiple)</button>
    <button class="sm ${deep?'':'ghost'}" onclick="setCongMode('deep')">Deep (full engine per segment)</button>
  </div>
  <div class="muted" style="margin-top:6px;">${deep?'Deep mode runs DCF + multiples + NAV + triangulation on each segment — enter each segment’s financials.':'Quick mode applies one sector multiple to each segment’s earnings.'}</div>
  <div style="margin-top:12px;">${segHtml}</div>
  <button class="sm ghost" onclick="addSeg()">+ Add segment</button>
  <div class="card" style="margin-top:14px;">
    <div class="grid">
      ${field('Net debt (cash = negative)','c_netdebt','0','number')}
      ${field('Conglomerate discount (0–0.5)','c_disc','0.10','number')}
    </div>
    <div class="row" style="margin-top:14px;"><button onclick="runConglomerate()">Value it</button>
      <button class="ghost" onclick="$('main').innerHTML='';loadDeals();">Close</button></div>
    <div id="c_result"></div>
  </div>`;
}
function _readSegs(){
  SEGMENTS=SEGMENTS.map((s,i)=>{
    if(!$('cs_name_'+i)) return s;
    const base={...s,name:$('cs_name_'+i).value,sector:$('cs_sector_'+i).value,
      metric:$('cs_metric_'+i).value,tier:$('cs_tier_'+i).value};
    if(CONG_MODE==='deep'){
      return {...base,net_income:$('cs_ni_'+i).value,depreciation:$('cs_dep_'+i).value,
        interest:$('cs_int_'+i).value,taxes:$('cs_tax_'+i).value,
        total_assets:$('cs_ta_'+i).value,total_liabilities:$('cs_tl_'+i).value};
    }
    return {...base,earnings:$('cs_earn_'+i).value};
  });
}
function addSeg(){ _readSegs(); SEGMENTS.push(_newSeg()); renderConglomerate(); }
function removeSeg(i){ _readSegs(); SEGMENTS.splice(i,1); renderConglomerate(); }
function _fin(s){
  const f={}; const map={net_income:'net_income',depreciation:'depreciation',interest:'interest',
    taxes:'taxes',total_assets:'total_assets',total_liabilities:'total_liabilities'};
  for(const k of Object.keys(map)){ if(s[k]!==''&&s[k]!=null) f[k]=Number(s[k]); }
  return f;
}
async function runConglomerate(){
  _readSegs();
  let segs, p;
  if(CONG_MODE==='deep'){
    segs=SEGMENTS.filter(s=>s.net_income!=='').map(s=>({name:s.name||'Segment',
      financials:_fin(s), comparables:{sector:s.sector,metric:s.metric,tier:s.tier}}));
    if(!segs.length){$('c_result').innerHTML='<div class="muted" style="margin-top:12px;">Add at least one segment with net income.</div>';return;}
    p={mode:'deep',segments:segs};
  } else {
    segs=SEGMENTS.filter(s=>s.earnings!=='').map(s=>({name:s.name||'Segment',
      sector:s.sector,metric:s.metric,tier:s.tier,earnings:Number(s.earnings)}));
    if(!segs.length){$('c_result').innerHTML='<div class="muted" style="margin-top:12px;">Add at least one segment with earnings.</div>';return;}
    p={segments:segs};
  }
  p.net_debt=Number($('c_netdebt').value||0); p.conglomerate_discount=Number($('c_disc').value||0);
  $('c_result').innerHTML='<div class="muted" style="margin-top:12px;">Valuing…</div>';
  const env=await api('POST','/api/sotp',p);
  const box=$('c_result');
  if(!env.ok){box.innerHTML=`<div class="muted" style="color:#C0392B;margin-top:12px;">${env.error.message}</div>`;return;}
  const r=env.result, eq=r.equity_range;
  let rows=r.segments.map(s=>{
    const meta = s.multiple ? `${s.sector} ×${s.multiple[0]}–${s.multiple[1]}` : `deep: ${(s.approaches||[]).join('+')}`;
    return `<tr><td>${s.name} <span class="muted">(${meta})</span></td><td class="num">${money(s.value_range.low)} – ${money(s.value_range.high)}</td></tr>`;
  }).join('');
  window._lastSotp=r;
  box.innerHTML=`<div class="hero" style="margin-top:16px;">
      <div class="lbl">Sum-of-the-parts equity value <span style="opacity:.8">· ${r.mode} mode</span></div>
      <div class="rng">${money(eq.low)} – ${money(eq.high)}</div>
      <div class="mid">Midpoint ${money(eq.mid)} · after ${Math.round(r.conglomerate_discount*100)}% discount, net debt ${money(r.net_debt)}</div></div>
    <table><thead><tr><th>Segment</th><th style="text-align:right">Value</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="row" style="margin-top:10px;"><button class="sm ghost" onclick="explainResult('sotp',window._lastSotp,'sotp_explain')">📖 Explain in plain English</button></div>
    <div id="sotp_explain"></div>`;
}
// ---- Due diligence checklist ----
const CK_STATUS=['not_started','in_progress','complete','flagged','na'];
const CK_RATING=['none','low','medium','high'];
function _yn(id){const v=$(id)?$(id).value:''; return v==='yes'?true:(v==='no'?false:undefined);}
function _ynVal(b){return b===true?'yes':(b===false?'no':'');}

async function openChecklist(id){
  const denv=await api('GET','/api/deals/'+id);
  if(!denv.ok){toast('Error');return;}
  const d=denv.result, cl=d.checklist||{}, bt=cl.business_type||'general';
  const existing={}; (cl.items||[]).forEach(it=>existing[it.id]=it);
  const sig=cl.signals||{};
  const tenv=await api('GET','/api/diligence/template?business_type='+encodeURIComponent(bt));
  if(!tenv.ok){toast(tenv.error.message);return;}
  const items=tenv.result.items;
  const aiFindings=cl.ai_findings||[];
  window._ckId=id; window._ckBt=bt; window._ckItems=items.map(i=>i.id); window._ckAiFindings=aiFindings;
  const cats={}; items.forEach(it=>{(cats[it.category]=cats[it.category]||[]).push(it);});
  let body=`<h2>📋 Due diligence — ${d.target_name||'deal'}</h2>
    <div class="muted">Business type: <strong>${bt}</strong>. Work through each item as you investigate and flag concerns. The facts you enter below trigger automatic red flags that adjust the valuation. ★ = critical item.</div>`;
  if(aiFindings.length){
    const colors={high:'#c0392b',medium:'#b9770e',low:'#7a7a7a'};
    body+=`<div class="card" style="margin-top:14px;background:#fff8f0;border-color:#f0d8b8;">
      <label style="margin-top:0;">🧠 AI-flagged from the uploaded report <span class="sub" style="font-weight:400;color:#888;font-size:12px;">(suggestions — confirm each against the source)</span></label>`
      + aiFindings.map(f=>`<div style="padding:6px 9px;margin-bottom:5px;border-left:3px solid ${colors[f.severity]||'#999'};background:#fff;border-radius:5px;">
          <strong style="color:${colors[f.severity]||'#333'};text-transform:uppercase;font-size:11px;">${f.severity}</strong>
          <span style="font-size:11px;color:#888;"> · ${f.category}</span><br>${(f.finding||'').replace(/</g,'&lt;')}</div>`).join('')
      + `<div class="muted" style="font-size:11px;">Related facts are pre-filled below where the report was clear. Verify, then set the matching items' status/risk.</div></div>`;
  }
  body+=`
    <h3>Key facts <span class="sub" style="font-weight:400;color:#888;font-size:12px;">(drive automatic red flags — leave blank if unknown)</span></h3>
    <div class="muted" style="margin-bottom:6px;">Enter what you know. These can be pre-filled from imported data in future; for now they're manual.</div>
    <div class="card"><div class="grid3">
      ${field('Top customer % of revenue','ck_sig_topcust',sig.top_customer_pct!=null?sig.top_customer_pct:'','number')}
      ${field('Customer retention %','ck_sig_retention',sig.customer_retention_pct!=null?sig.customer_retention_pct:'','number')}
      ${selectField('Revenue trend','ck_sig_trend',['','growing','flat','declining'],sig.revenue_trend||'')}
      ${selectField('Owner-dependent?','ck_sig_owner',['','yes','no'],_ynVal(sig.owner_dependent))}
      ${selectField('Clean books?','ck_sig_books',['','yes','no'],_ynVal(sig.clean_books))}
      ${selectField('Litigation pending?','ck_sig_lit',['','yes','no'],_ynVal(sig.litigation_pending))}
      ${selectField('Contracts assignable?','ck_sig_contracts',['','yes','no'],_ynVal(sig.contracts_assignable))}
      ${selectField('Taxes current?','ck_sig_taxes',['','yes','no'],_ynVal(sig.taxes_current))}
    </div></div>`;
  for(const cat of Object.keys(cats)){
    body+=`<h3>${cat}</h3>`;
    cats[cat].forEach(it=>{
      const e=existing[it.id]||{};
      body+=`<div class="card" style="padding:10px;margin-bottom:6px;">
        <div>${it.prompt} ${it.critical?'<span title="critical" style="color:#C0392B">★</span>':''}</div>
        <div class="grid3" style="margin-top:6px;">
          ${selectField('Status','ck_st_'+it.id,CK_STATUS,e.status||'not_started')}
          ${selectField('Risk','ck_rk_'+it.id,CK_RATING,e.risk_rating||'none')}
          ${field('Notes','ck_nt_'+it.id,(e.notes||'').replace(/"/g,'&quot;'))}
        </div></div>`;
    });
  }
  body+=`<div class="row" style="margin-top:16px;position:sticky;bottom:0;background:#eef1f6;padding:12px 0;">
     <button onclick="saveChecklist()">Save &amp; re-evaluate</button>
     <button class="ghost" onclick="openDeal('${id}')">Back to deal</button></div>`;
  $('main').innerHTML=body; window.scrollTo(0,0);
}
async function saveChecklist(){
  const id=window._ckId, bt=window._ckBt, ids=window._ckItems||[];
  const items=[];
  ids.forEach(iid=>{
    const st=$('ck_st_'+iid).value, rk=$('ck_rk_'+iid).value, nt=$('ck_nt_'+iid).value;
    if(st!=='not_started'||rk!=='none'||(nt&&nt.trim())) items.push({id:iid,status:st,risk_rating:rk,notes:nt});
  });
  const sig={};
  const tc=num('ck_sig_topcust'); if(tc!==undefined)sig.top_customer_pct=tc;
  const rr=num('ck_sig_retention'); if(rr!==undefined)sig.customer_retention_pct=rr;
  const rt=$('ck_sig_trend').value; if(rt)sig.revenue_trend=rt;
  [['ck_sig_owner','owner_dependent'],['ck_sig_books','clean_books'],['ck_sig_lit','litigation_pending'],['ck_sig_contracts','contracts_assignable'],['ck_sig_taxes','taxes_current']].forEach(([el,key])=>{const v=_yn(el); if(v!==undefined)sig[key]=v;});
  const cl={business_type:bt,items,signals:sig};
  if(window._ckAiFindings&&window._ckAiFindings.length) cl.ai_findings=window._ckAiFindings;
  const env=await api('PATCH','/api/deals/'+id,{checklist:cl});

}

function num(id){const v=$(id).value.trim();return v===''?undefined:Number(v);}

function _fillFromIngest(env){
  if(!env.ok){$('f_extract_msg').textContent='Error: '+env.error.message;return;}
  const f=env.result.financials||{};
  const map={revenue:'f_revenue',net_income:'f_ni',owner_compensation:'f_owner',interest:'f_int',taxes:'f_tax',depreciation:'f_dep',amortization:'f_amort',total_assets:'f_assets',total_liabilities:'f_liab'};
  let n=0;
  for(const [k,id] of Object.entries(map)){ if(f[k]!=null && $(id)){ $(id).value=f[k]; n++; } }
  const warn=(env.result.warnings||[]).length;
  $('f_extract_msg').textContent=`Filled ${n} field${n===1?'':'s'}`+(warn?` · ${warn} warning(s) — check Revenue/Net income`:'')+'. Review before creating.';
  _autoFitSize();
}

// Large companies shouldn't be valued with small-business defaults. When revenue
// is big, switch to public-market multiples on EBITDA (the correct lens).
const _BIG_REVENUE = 5e8;   // $500M
function _autoFitSize(){
  const notes=[];
  const rev=num('f_revenue');
  if(rev!==undefined && rev>=_BIG_REVENUE){
    if($('f_tier')&&$('f_tier').value!=='public'){$('f_tier').value='public';notes.push('Public tier');}
    if($('f_metric')&&$('f_metric').value!=='ebitda'){$('f_metric').value='ebitda';notes.push('EBITDA metric');}
  }
  if(notes.length){ $('f_autofit').textContent=`Auto-set ${notes.join(' + ')} — this looks like a large company, so small-business multiples would undervalue it. Change back if that's wrong.`; }
}
function _sectorKnown(s){ return s && META.sectors.includes(s); }

async function extractPaste(){
  const text=$('f_paste').value.trim();
  if(!text){$('f_extract_msg').textContent='Upload a file or paste text first.';return;}
  $('f_extract_msg').textContent='Extracting…';
  _fillFromIngest(await api('POST','/api/ingest',{text}));
}

async function extractFile(){
  const file=$('f_file').files[0];
  if(!file)return;
  $('f_extract_msg').textContent='Reading '+file.name+'…';
  const buf=await file.arrayBuffer();
  let bin=''; const bytes=new Uint8Array(buf);
  for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  const b64=btoa(bin);
  _fillFromIngest(await api('POST','/api/ingest',{filename:file.name, content_b64:b64}));
}

function _fillSignals(sig){
  if(!sig)return;
  if(sig.top_customer_pct!=null && $('f_topcust')) $('f_topcust').value=sig.top_customer_pct;
  if(sig.revenue_trend && $('f_trend')) $('f_trend').value=sig.revenue_trend;
  if(sig.owner_dependent!=null && $('f_ownerdep')) $('f_ownerdep').value=String(sig.owner_dependent);
}

function _renderFindings(res){
  const box=$('f_findings'); if(!box)return;
  const fnd=res.findings||[];
  const src={llm:'AI-read',keywords:'keyword scan',keywords_fallback:'keyword scan (AI unavailable)'}[res.source]||res.source;
  const colors={high:'#c0392b',medium:'#b9770e',low:'#7a7a7a'};
  let html=`<div class="muted" style="margin-bottom:4px;">Diligence findings <span style="opacity:.7">· ${src}${res.model?' · '+res.model:''}</span></div>`;
  if(!fnd.length){ html+=`<div class="muted">No red flags surfaced. Still review the full document.</div>`; }
  else html+=fnd.map(f=>`<div style="padding:6px 9px;margin-bottom:5px;border-left:3px solid ${colors[f.severity]||'#999'};background:#fff;border-radius:5px;">
      <strong style="color:${colors[f.severity]||'#333'};text-transform:uppercase;font-size:11px;">${f.severity}</strong>
      <span style="font-size:11px;color:#888;"> · ${f.category}</span><br>${f.finding}</div>`).join('');
  html+=`<div class="muted" style="margin-top:4px;font-size:11px;">These are suggestions to verify — they pre-fill the risk signals above; confirm on the due-diligence checklist after creating.</div>`;
  box.innerHTML=html;
}

async function understandDoc(){
  const file=$('f_file').files[0];
  const text=$('f_paste').value.trim();
  if(!file && !text){$('f_extract_msg').textContent='Upload a report or paste text first.';return;}
  $('f_extract_msg').textContent='Reading the document…';
  $('f_findings').innerHTML='';
  let env;
  if(file){
    const buf=await file.arrayBuffer(); let bin=''; const bytes=new Uint8Array(buf);
    for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    env=await api('POST','/api/understand',{filename:file.name, content_b64:btoa(bin)});
  } else {
    env=await api('POST','/api/understand',{text});
  }
  if(!env.ok){$('f_extract_msg').textContent='Error: '+env.error.message;return;}
  const res=env.result;
  // Stash the AI signals + findings so createDeal can attach them to the deal.
  window._aiExtract={signals:res.signals||{}, findings:res.findings||[]};
  _fillFromIngest({ok:true, result:{financials:res.financials, warnings:res.warnings}});  // also runs _autoFitSize
  _fillSignals(res.signals);
  // AI-suggested name + sector (only fill what's empty / known).
  const extra=[];
  if(res.company_name && $('f_name') && !$('f_name').value.trim()){ $('f_name').value=res.company_name; extra.push('name'); }
  if(_sectorKnown(res.sector) && $('f_sector')){ $('f_sector').value=res.sector; extra.push('sector '+res.sector); }
  if(extra.length){ const el=$('f_autofit'); el.textContent=(el.textContent?el.textContent+' ':'')+'From the report: set '+extra.join(', ')+'.'; }
  _renderFindings(res);
}

async function createDeal(andEvaluate){
  const fin={}; const map={f_revenue:'revenue',f_ni:'net_income',f_owner:'owner_compensation',f_int:'interest',f_tax:'taxes',f_dep:'depreciation',f_amort:'amortization',f_assets:'total_assets',f_liab:'total_liabilities'};
  for(const [id,key] of Object.entries(map)){const v=num(id);if(v!==undefined)fin[key]=v;}
  // Start from any AI-extracted signals, then let the visible form fields win.
  const ai=window._aiExtract||{signals:{},findings:[]};
  const signals=Object.assign({}, ai.signals||{});
  const tc=num('f_topcust'); if(tc!==undefined)signals.top_customer_pct=tc;
  const trend=$('f_trend').value; if(trend)signals.revenue_trend=trend;
  const od=$('f_ownerdep').value; if(od)signals.owner_dependent=(od==='true');
  const checklist={business_type:$('f_btype').value, items:[], signals};
  if(ai.findings&&ai.findings.length) checklist.ai_findings=ai.findings;
  const deal={
    target_name:$('f_name').value||'Untitled target',
    stage:'screening',
    financials:fin,
    checklist,
    comparables:{sector:$('f_sector').value, metric:$('f_metric').value, tier:$('f_tier').value}
  };
  const env=await api('POST','/api/deals',deal);
  if(!env.ok){toast('Error: '+env.error.message);return;}
  await loadDeals();
  if(andEvaluate){ toast('Deal created — evaluating…'); evaluate(env.result.id); }
  else { toast('Deal created'); openDeal(env.result.id); }
}

async function openDeal(id){
  CURRENT=id; await loadDeals();
  const env=await api('GET','/api/deals/'+id);
  if(!env.ok){toast('Error');return;}
  const d=env.result;
  const ev=d.last_evaluation;
  let body=`<h2>${d.target_name}</h2>
    <div class="row" style="justify-content:space-between;">
      <span class="muted">Stage: <span class="stage">${d.stage}</span> · ${d.checklist&&d.checklist.business_type||'—'} · sector ${d.comparables&&d.comparables.sector||'—'}</span>
      <span class="row">
        <button class="sm" onclick="evaluate('${id}')">Evaluate</button>
        <button class="sm ghost" onclick="openChecklist('${id}')">📋 Due diligence</button>
        <button class="sm ghost" onclick="viewReport('${id}')" ${ev?'':'disabled'}>View report</button>
        <button class="sm ghost" onclick="viewPlainReport('${id}')" ${ev?'':'disabled'}>📖 Plain-English report</button>
        <button class="sm ghost" onclick="delDeal('${id}')">Delete</button>
      </span>
    </div>`;

  if(!ev){
    body+=`<div class="card" style="margin-top:16px;"><div class="muted">Not evaluated yet. Click <strong>Evaluate</strong> to run diligence, comparables, and valuation.</div></div>`;
  } else {
    const rr=ev.recommendation.range;
    body+=`<div class="hero"><div class="lbl">Recommended value range</div>
      <div class="rng">${money(rr.low)} – ${money(rr.high)}</div>
      <div class="mid">Midpoint ${money(rr.mid)} · risk multiple cut ${Math.round(ev.recommendation.risk_multiple_discount*100)}%</div></div>`;
    const ap=ev.valuation.approaches;
    let rows='';
    if(ap.income){rows+=`<tr><td>Income — DCF</td><td class="num">${money(ap.income.dcf.value)}</td></tr>`;
      rows+=`<tr><td>Income — Capitalization</td><td class="num">${money(ap.income.capitalization.value)}</td></tr>`;}
    if(ap.market){rows+=`<tr><td>Market — ${ap.market.metric.toUpperCase()} ${xx(ap.market.low_multiple)}–${xx(ap.market.high_multiple)}</td><td class="num">${money(ap.market.low)} – ${money(ap.market.high)}</td></tr>`;}
    if(ap.asset){rows+=`<tr><td>Asset — Net Asset Value</td><td class="num">${money(ap.asset.value)}</td></tr>`;}
    body+=`<h3>Valuation approaches</h3><table><thead><tr><th>Approach</th><th style="text-align:right">Result</th></tr></thead><tbody>${rows}</tbody></table>`;
    const flags=(ev.diligence&&ev.diligence.red_flags)||[];
    if(flags.length){
      body+=`<h3>Key risks</h3><div>`+flags.map(f=>{
        const c=f.severity==='high'?'#C0392B':f.severity==='medium'?'#E67E22':'#7F8C8D';
        return `<div class="flag"><span class="badge" style="background:${c}">${f.severity.toUpperCase()}</span>${f.category}: ${f.label}</div>`;
      }).join('')+`</div>`;
    }
    body+=`<h3>AI summary <span class="sub" style="font-weight:400;color:#888;font-size:12px;">(auto-drafted — review before sharing)</span></h3>
      <button class="sm ghost" onclick="draftSummary('${id}')">✦ Draft summary</button>
      <div id="ai_summary" style="margin-top:10px;white-space:pre-wrap;font-size:14px;line-height:1.55;"></div>`;
    body+=`<div class="row" style="margin-top:18px;">
      <button class="sm" onclick="genReport('${id}','html')">Save HTML report</button>
      <button class="sm ghost" onclick="genReport('${id}','docx')">Save Word report</button>
      <button class="sm ghost" onclick="genReport('${id}','markdown')">Save Markdown</button></div>`;
  }
  // --- Collaboration ---
  const isOwner = (d.my_role==='owner') || (ME && d.owner_id===ME.id) || !d.owner_id;
  let collab = `<h3>Collaboration <span class="sub" style="font-weight:400;color:#888;font-size:12px;">(${d.my_role||'owner'})</span></h3>`;
  const shared = d.shared_with||[];
  if(shared.length){
    collab += `<div class="muted" style="margin-bottom:6px;">Shared with:</div>`;
    collab += shared.map(s=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:5px 0;">
      <span>${s.email} <span class="stage">${s.role}</span></span>
      ${isOwner?`<button class="sm ghost" onclick="unshareDeal('${id}','${s.user_id}')">Remove</button>`:''}</div>`).join('');
  }
  if(isOwner){
    collab += `<div class="row" style="margin-top:10px;gap:8px;">
      <input id="share_email" placeholder="teammate@email.com" style="flex:1;min-width:160px;">
      <select id="share_role" style="width:auto"><option value="viewer">viewer</option><option value="editor">editor</option></select>
      <button class="sm" onclick="shareDeal('${id}')">Share</button></div>
      <div id="share_msg" class="muted" style="margin-top:6px;"></div>`;
  }
  // Comments
  collab += `<h3>Comments</h3>`;
  const comments = d.comments||[];
  collab += comments.length ? comments.map(c=>`<div style="border-bottom:1px solid var(--line);padding:7px 0;">
      <div style="font-size:13px;color:#556;"><strong>${c.author||c.user_id||'someone'}</strong> · ${(c.at||'').replace('T',' ').slice(0,16)}</div>
      <div>${c.text.replace(/</g,'&lt;')}</div></div>`).join('') : `<div class="muted">No comments yet.</div>`;
  collab += `<div class="row" style="margin-top:10px;gap:8px;">
      <input id="comment_text" placeholder="Add a comment…" style="flex:1;">
      <button class="sm" onclick="addComment('${id}')">Post</button></div>`;
  body += collab;

  $('main').innerHTML=body;
  window._lastEval = ev;
}

  const env=await api('POST','/api/assist',{action:'draft_narrative',result:window._lastEval,options:{format:'text'}});
  if(!env.ok){box.textContent='Error: '+env.error.message;return;}
  box.textContent=env.result.narrative;
}
async function delDeal(id){
  if(!confirm('Delete this deal?'))return;
  await api('DELETE','/api/deals/'+id);
  CURRENT=null; $('main').innerHTML=''; loadDeals(); toast('Deleted');
}
async function shareDeal(id){
  const email=$('share_email').value.trim(), role=$('share_role').value;
  if(!email){$('share_msg').textContent='Enter an email.';return;}
  const env=await api('POST','/api/deals/'+id+'/share',{email,role});
  if(!env.ok){$('share_msg').textContent=env.error.message;return;}
  toast('Shared with '+email); openDeal(id);
}
async function unshareDeal(id,uid){
  await api('POST','/api/deals/'+id+'/unshare',{target_user_id:uid});
  toast('Access removed'); openDeal(id);
}
async function addComment(id){
  const text=$('comment_text').value.trim();
  if(!text)return;
  const env=await api('POST','/api/deals/'+id+'/comment',{text,author:ME?ME.email:''});
  if(!env.ok){toast(env.error.message);return;}
  openDeal(id);
}

// ---- Auth ----
let ME = null;
let AUTH_MODE = 'login';

function toggleAuthMode(){
  AUTH_MODE = AUTH_MODE==='login' ? 'signup' : 'login';
  $('authTitle').textContent = AUTH_MODE==='login' ? 'Log in to DealLens' : 'Create your DealLens account';
  $('authSub').textContent = AUTH_MODE==='login' ? 'Sign in to your deals.' : 'Start evaluating deals in minutes.';
  $('authBtn').textContent = AUTH_MODE==='login' ? 'Log in' : 'Sign up';
  $('authToggle').textContent = AUTH_MODE==='login' ? 'Create an account' : 'I already have an account';
  $('nameField').classList.toggle('hidden', AUTH_MODE==='login');
  $('authErr').textContent='';
}

async function doAuth(){
  $('authErr').textContent='';
  const path = AUTH_MODE==='login' ? '/api/auth/login' : '/api/auth/signup';
  const body = {email:$('au_email').value.trim(), password:$('au_pass').value};
  if(AUTH_MODE==='signup') body.name = $('au_name').value.trim();
  const env = await api('POST', path, body);
  if(!env.ok){ $('authErr').textContent = env.error.message; return; }
  ME = env.result.user;
  enterApp();
}

async function logout(){
  await api('POST','/api/auth/logout',{});
  ME=null; CURRENT=null;
  $('app').classList.add('hidden'); $('logoutBtn').classList.add('hidden'); $('whoami').textContent='';
  $('authGate').classList.remove('hidden');
}

function showAuthGate(){
  $('authGate').classList.remove('hidden');
  $('app').classList.add('hidden');
  $('logoutBtn').classList.add('hidden');
}

async function enterApp(){
  $('authGate').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('logoutBtn').classList.remove('hidden');
  $('whoami').textContent = ME.email;
  await loadMeta(); await loadDeals();
  $('main').innerHTML='<h2>Welcome to DealLens</h2><div class="muted">Select a deal on the left, or create a new one to run a full evaluation.</div>';
}

(async function init(){
  const env = await api('GET','/api/auth/me');
  if(env.ok && env.result.user){ ME = env.result.user; enterApp(); }
  else { showAuthGate(); }
})();
</script>
</body></html>
