# Railway service config for DealLens.
# Railway builds the Dockerfile and injects $PORT. Attach a Volume mounted at
# /data so the SQLite database survives redeploys (Settings -> Volumes).

[build]
builder = "dockerfile"

[deploy]
startCommand = "python -m ui --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Set in the Railway dashboard (Variables), not committed here:
#   DEALLENS_DB = /data/deallens.db
#   DEALLENS_HOME = /app
# And add a Volume with mount path: /data
